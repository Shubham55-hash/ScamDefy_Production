<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ScamDefy - Page Blocked</title>
  <style>
    body {
      margin: 0; padding: 0; height: 100vh;
      display: flex; align-items: center; justify-content: center;
      background-color: #0f172a; color: #f8fafc;
      font-family: 'Inter', system-ui, sans-serif;
    }
    .container {
      max-width: 600px; padding: 40px; background: #1e293b;
      border-radius: 12px; border: 1px solid #ef4444; border-top: 6px solid #ef4444;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5); text-align: center;
    }
    .shield { font-size: 64px; margin-bottom: 20px; color: #ef4444; }
    h1 { margin: 0 0 10px 0; color: #f8fafc; font-size: 28px; }
    .url { word-break: break-all; color: #fca5a5; font-size: 14px; margin-bottom: 20px; padding: 10px; background: #0f172a; border-radius: 6px; }
    
    .score-panel { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; }
    .score-box { background: #0f172a; padding: 15px 25px; border-radius: 8px; border: 1px solid #334155; }
    .score-val { font-size: 32px; font-weight: 700; color: #ef4444; }
    .verdict-val { font-size: 18px; font-weight: 700; color: #ef4444; margin-top: 5px; }
    
    .explanation { font-size: 15px; color: #cbd5e1; line-height: 1.6; margin-bottom: 30px; text-align: left; }
    
    .breakdown { background: #0f172a; border-radius: 8px; padding: 15px; margin-bottom: 30px; text-align: left; border: 1px solid #334155;}
    .breakdown h3 { margin-top: 0; font-size: 14px; color: #94a3b8; text-transform: uppercase; }
    .breakdown ul { margin: 0; padding-left: 20px; color: #f8fafc; font-size: 14px;}
    .breakdown li { margin-bottom: 6px; }
    
    .buttons { display: flex; flex-direction: column; gap: 12px; }
    button { padding: 12px; border-radius: 6px; font-weight: 600; font-size: 15px; cursor: pointer; border: none; transition: 0.2s; }
    .btn-back { background: #3b82f6; color: white; }
    .btn-back:hover { background: #2563eb; }
    .btn-proceed { background: transparent; color: #94a3b8; border: 1px solid #334155; }
    .btn-proceed:hover { background: #334155; color: white; }
    .btn-report { background: transparent; color: #fca5a5; text-decoration: underline; padding: 0; font-weight: normal; margin-top: 10px; }
    .btn-report:hover { color: #ef4444; }
  </style>
</head>
<body>

  <div class="container">
    <div class="shield">🛡️</div>
    <h1>ScamDefy Blocked This Page</h1>
    <div id="blockedUrl" class="url">Loading...</div>
    
    <div class="score-panel">
      <div class="score-box">
        <div id="riskScore" class="score-val">--</div>
        <div style="font-size:12px; color:#94a3b8">Risk Score</div>
      </div>
      <div class="score-box">
        <div id="riskVerdict" class="verdict-val">--</div>
        <div style="font-size:12px; color:#94a3b8">Verdict</div>
      </div>
    </div>
    
    <div id="riskExplanation" class="explanation"></div>
    
    <div class="breakdown">
      <h3>Detection Breakdown</h3>
      <ul id="flagList">
        <!-- Flags populated by JS -->
      </ul>
    </div>
    
    <div class="buttons">
      <button id="btnBack" class="btn-back">Go Back (Recommended)</button>
      <button id="btnProceed" class="btn-proceed">Proceed Anyway (I understand the risk)</button>
      <button id="btnReport" class="btn-report">Report False Positive</button>
    </div>
  </div>

  <script type="module" src="warning.js"></script>
</body>
</html>
