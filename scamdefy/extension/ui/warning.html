<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ScamDefy — Threat Detected</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ── Reset ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    ::selection { background: rgba(0,242,255,0.25); }

    /* ── Base ───────────────────────────────────────────── */
    body {
      min-height: 100vh;
      background: #0a0b0d;
      color: #e2e8f0;
      font-family: 'Space Grotesk', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
      overflow-x: hidden;
    }

    /* Ambient glow behind card */
    body::before {
      content: '';
      position: fixed;
      top: 35%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 700px;
      height: 700px;
      background: radial-gradient(circle, rgba(239,68,68,0.07) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
      transition: background 0.6s;
    }
    body.critical-mode::before {
      background: radial-gradient(circle, rgba(255,0,229,0.08) 0%, transparent 70%);
    }

    /* Dot grid overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle at 2px 2px, rgba(255,255,255,0.04) 1px, transparent 0);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Scrollbar ──────────────────────────────────────── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #00f2ff; border-radius: 10px; }

    /* ── Warning Card ────────────────────────────────────── */
    .warning-card {
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(239,68,68,0.35);
      border-radius: 20px;
      padding: 44px 40px 36px;
      max-width: 700px;
      width: 100%;
      position: relative;
      z-index: 1;
      box-shadow:
        0 0 60px rgba(239,68,68,0.08),
        0 24px 60px rgba(0,0,0,0.6),
        inset 0 1px 0 rgba(255,255,255,0.05);
      animation: card-appear 0.45s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    .warning-card.critical {
      border-color: rgba(255,0,229,0.4);
      box-shadow:
        0 0 80px rgba(255,0,229,0.1),
        0 24px 60px rgba(0,0,0,0.6),
        inset 0 1px 0 rgba(255,255,255,0.05);
    }

    @keyframes card-appear {
      from { opacity: 0; transform: scale(0.92) translateY(24px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* Animated top accent strip */
    .warning-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, #ef4444, #f97316, #ef4444);
      background-size: 200% 100%;
      border-radius: 20px 20px 0 0;
      animation: strip-slide 2.5s linear infinite;
    }
    .warning-card.critical::before {
      background: linear-gradient(90deg, #ff00e5, #a855f7, #ff00e5);
      background-size: 200% 100%;
    }
    @keyframes strip-slide {
      0%   { background-position: 0% 50%; }
      100% { background-position: 200% 50%; }
    }

    /* ── Shield Icon ──────────────────────────────────────── */
    .warning-shield {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      background: rgba(239,68,68,0.1);
      border: 2px solid rgba(239,68,68,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      margin: 0 auto 22px;
      position: relative;
      animation: shield-pulse 2.2s ease-in-out infinite;
    }
    .warning-shield.critical {
      background: rgba(255,0,229,0.1);
      border-color: rgba(255,0,229,0.4);
      animation: shield-pulse-crit 2.2s ease-in-out infinite;
    }
    @keyframes shield-pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.4); }
      50%       { box-shadow: 0 0 0 18px rgba(239,68,68,0); }
    }
    @keyframes shield-pulse-crit {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255,0,229,0.4); }
      50%       { box-shadow: 0 0 0 18px rgba(255,0,229,0); }
    }

    /* ── Risk Level Badge ─────────────────────────────────── */
    .level-wrap { text-align: center; margin-bottom: 14px; }
    .level-badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 5px 16px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      font-family: monospace;
      border: 1px solid rgba(239,68,68,0.4);
      background: rgba(239,68,68,0.1);
      color: #ef4444;
    }
    .level-badge.CRITICAL {
      border-color: rgba(255,0,229,0.4);
      background: rgba(255,0,229,0.1);
      color: #ff00e5;
    }
    .level-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: currentColor;
      animation: dot-blink 1.4s ease-in-out infinite;
    }
    @keyframes dot-blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    /* ── Title & Scam Type ────────────────────────────────── */
    .warning-title {
      font-size: 30px;
      font-weight: 800;
      color: #f1f5f9;
      text-align: center;
      margin-bottom: 6px;
      letter-spacing: -0.5px;
    }
    .warning-scam-type {
      font-size: 15px;
      font-weight: 600;
      text-align: center;
      margin-bottom: 28px;
      color: #f97316;
    }
    .warning-scam-type.CRITICAL { color: #ff00e5; }

    /* ── Blocked URL Box ──────────────────────────────────── */
    .url-box {
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(239,68,68,0.2);
      border-radius: 10px;
      padding: 11px 16px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      overflow: hidden;
    }
    .url-label {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: rgba(255,255,255,0.3);
      white-space: nowrap;
      flex-shrink: 0;
      font-family: monospace;
    }
    .url-value {
      font-family: monospace;
      font-size: 12px;
      color: #fca5a5;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── AI Explanation Box ───────────────────────────────── */
    .explanation-box {
      background: rgba(0,242,255,0.04);
      border: 1px solid rgba(0,242,255,0.18);
      border-radius: 10px;
      padding: 16px 18px;
      margin-bottom: 22px;
    }
    .explanation-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.25em;
      color: #00f2ff;
      margin-bottom: 10px;
      font-family: monospace;
    }
    .ai-badge {
      background: #00f2ff;
      color: #0a0b0d;
      font-size: 8px;
      font-weight: 900;
      padding: 2px 7px;
      border-radius: 4px;
      letter-spacing: 0.1em;
    }
    .explanation-text {
      font-size: 14px;
      color: rgba(255,255,255,0.6);
      line-height: 1.75;
    }

    /* ── Risk Score Bar ───────────────────────────────────── */
    .score-section { margin-bottom: 22px; }
    .score-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .score-label {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.25em;
      color: rgba(255,255,255,0.3);
      font-family: monospace;
    }
    .score-value {
      font-size: 14px;
      font-weight: 800;
      color: #ef4444;
      font-family: monospace;
    }
    .score-value.CRITICAL { color: #ff00e5; }
    .bar-track {
      height: 7px;
      background: rgba(255,255,255,0.05);
      border-radius: 8px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      border-radius: 8px;
      width: 0%;
      background: linear-gradient(90deg, #f59e0b, #ef4444);
      transition: width 1s cubic-bezier(0.34,1.56,0.64,1);
      box-shadow: 0 0 8px rgba(239,68,68,0.5);
    }
    .bar-fill.CRITICAL {
      background: linear-gradient(90deg, #ef4444, #ff00e5);
      box-shadow: 0 0 8px rgba(255,0,229,0.5);
    }

    /* ── Threat Signals ───────────────────────────────────── */
    .signals-section { margin-bottom: 28px; }
    .signals-title {
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.25em;
      color: rgba(255,255,255,0.3);
      margin-bottom: 10px;
      font-family: monospace;
    }
    .signals-list { list-style: none; display: flex; flex-direction: column; gap: 7px; }
    .signal-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      font-size: 13px;
      color: rgba(255,255,255,0.55);
      background: rgba(0,0,0,0.2);
      padding: 9px 13px;
      border-radius: 7px;
      border-left: 3px solid rgba(239,68,68,0.5);
    }
    .signal-item::before {
      content: '✕';
      color: #ef4444;
      font-size: 11px;
      margin-top: 2px;
      flex-shrink: 0;
      font-weight: 700;
    }

    /* ── Action Buttons ───────────────────────────────────── */
    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 24px;
    }
    .btn {
      padding: 14px 20px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      font-family: 'Space Grotesk', sans-serif;
      cursor: pointer;
      border: none;
      transition: all 0.2s ease;
      letter-spacing: 0.05em;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    /* Green "Take Me to Safety" — exactly as in video */
    #btnGoBack {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: white;
      box-shadow: 0 4px 24px rgba(34,197,94,0.3);
    }
    #btnGoBack:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(34,197,94,0.45);
    }
    /* "Proceed Anyway" — text style with warning icon, as in video */
    #btnProceed {
      background: rgba(255,255,255,0.03);
      color: rgba(255,255,255,0.4);
      border: 1px solid rgba(255,255,255,0.08);
    }
    #btnProceed:hover {
      border-color: rgba(239,68,68,0.4);
      color: #ef4444;
      background: rgba(239,68,68,0.06);
    }

    /* ── Branding ─────────────────────────────────────────── */
    .brand-footer {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      opacity: 0.35;
    }
    .brand-footer span {
      font-size: 11px;
      font-weight: 600;
      font-family: monospace;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <div class="warning-card" id="warningCard">

    <!-- Shield -->
    <div class="warning-shield" id="warningShield">⚠️</div>

    <!-- Risk badge -->
    <div class="level-wrap">
      <span class="level-badge" id="levelBadge">
        <span class="level-dot"></span>
        <span id="levelText">HIGH RISK</span>
      </span>
    </div>

    <!-- Title -->
    <h1 class="warning-title">Threat Blocked by ScamDefy</h1>
    <p class="warning-scam-type" id="scamTypeText">Phishing Website Detected</p>

    <!-- Blocked URL -->
    <div class="url-box">
      <span class="url-label">Blocked URL</span>
      <span class="url-value" id="blockedUrl">Loading...</span>
    </div>

    <!-- AI Explanation -->
    <div class="explanation-box">
      <div class="explanation-label">
        <span>⬡</span>
        <span>AI Scam Analysis</span>
        <span class="ai-badge" id="aiBadge">GEMINI AI</span>
      </div>
      <p class="explanation-text" id="explanationText">Analyzing threat...</p>
    </div>

    <!-- Risk Score Bar -->
    <div class="score-section">
      <div class="score-header">
        <span class="score-label">Risk Score</span>
        <span class="score-value" id="riskScoreValue">–/100</span>
      </div>
      <div class="bar-track">
        <div class="bar-fill" id="barFill"></div>
      </div>
    </div>

    <!-- Detected Signals -->
    <div class="signals-section" id="signalsSection" style="display:none;">
      <div class="signals-title">🔍 Detected Threat Signals</div>
      <ul class="signals-list" id="signalsList"></ul>
    </div>

    <!-- Buttons — matching video exactly -->
    <div class="actions">
      <button class="btn" id="btnGoBack">🛡️ Take Me to Safety</button>
      <button class="btn" id="btnProceed">⚠️ Proceed Anyway</button>
    </div>

    <!-- Branding -->
    <div class="brand-footer">
      <span>🛡️</span>
      <span>Protected by ScamDefy AI</span>
    </div>

  </div>

  <script type="module" src="warning.js"></script>
</body>
</html>
