services:
  - type: web
    name: scamdefy-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn index:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GOOGLE_SAFE_BROWSING_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: URLHAUS_API_KEY
        sync: false
